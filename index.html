<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATURAL IMPORTS | Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #f26122; --brand-orange-glow: rgba(242, 97, 34, 0.4);
            --brand-blue: #243776; --brand-blue-glow: rgba(36, 55, 118, 0.6);
            --bg-disk: #050509; --bg-card: #0a0b14;
            --text-primary: #fff; --text-secondary: #8b9bb4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-disk); color: var(--text-primary); font-family: 'Roboto', sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5vh; }
        .main-container { width: 100%; height: 100%; display: flex; flex-direction: column; gap: 1.5vh; }
        .global-focus-section { background: var(--bg-card); border: 1px solid rgba(36, 55, 118, 0.3); border-radius: 16px; padding: 3vh; height: 38vh; display: flex; align-items: center; justify-content: space-between; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .global-value { font-family: 'Orbitron'; font-size: 8.5vh; font-weight: 900; color: var(--brand-orange); text-shadow: 0 0 15px var(--brand-orange-glow); line-height: 1; }
        .global-chart-container { width: 30vh; height: 30vh; position: relative; display: flex; align-items: center; justify-content: center; }
        #globalPercentageText { position: absolute; font-family: 'Orbitron'; font-size: 5.5vh; font-weight: 700; color: var(--brand-orange); }
        .daily-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5vh; height: 16vh; }
        .card { background: var(--bg-card); border-radius: 12px; padding: 2vh; display: flex; flex-direction: column; justify-content: center; border: 1px solid rgba(255,255,255,0.02); }
        .card-header { color: var(--text-secondary); font-family: 'Orbitron'; font-size: 1.3vh; letter-spacing: 1px; margin-bottom: 0.5vh; }
        .card-value { font-family: 'Orbitron'; font-size: 4.5vh; font-weight: 700; }
        .risk-section { background: var(--bg-card); flex: 1; border-radius: 16px; padding: 2vh; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.02); }
        #alertBeacon { padding: 0.8vh 2vh; border-radius: 4px; font-family: 'Orbitron'; font-weight: 700; font-size: 1.4vh; text-transform: uppercase; transition: all 0.5s ease; }
    </style>
</head>
<body>

<div class="main-container">
    <header style="text-align:center; height: 3vh;"><h1 style="font-family:'Orbitron'; font-size:1.5vh; color:var(--text-secondary); letter-spacing:4px;">NATURAL IMPORTS | GLOBAL PERFORMANCE</h1></header>

    <section class="global-focus-section">
        <div>
            <p style="color:var(--text-secondary); font-family:'Orbitron'; font-size:1.5vh; margin-bottom:1vh;">META GLOBAL ACUMULADA</p>
            <div id="metaGlobalValue" class="global-value">R$ 0</div>
            <div style="display:flex; gap:3vh; margin-top:2vh; font-size:1.8vh; color:var(--text-secondary);">
                <div>Vendido: <b id="globalVendido" style="color:white">R$ 0</b></div>
                <div>Falta: <b id="globalRestante" style="color:white">R$ 0</b></div>
            </div>
        </div>
        <div class="global-chart-container">
            <canvas id="globalDoughnutChart"></canvas>
            <div id="globalPercentageText">0%</div>
        </div>
    </section>

    <section class="daily-grid">
        <div class="card"><p class="card-header">META DO DIA</p><div id="metaDiaValue" class="card-value">R$ 0</div></div>
        <div class="card" style="border-left: 5px solid var(--brand-orange);"><p class="card-header">VENDIDO HOJE</p><div id="vendidoHojeValue" class="card-value" style="color:var(--brand-orange)">R$ 0</div></div>
    </section>

    <section class="risk-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1vh;">
            <p style="font-family:'Orbitron'; font-size:1.3vh; color:var(--text-secondary);">TENDÊNCIA DE VENDAS (HISTÓRICO)</p>
            <div id="alertBeacon">Sincronizando...</div>
        </div>
        <div style="flex:1; position:relative;"><canvas id="riskLineChart"></canvas></div>
    </section>
</div>

<script>
    // URL da sua planilha com acesso de leitor concedido
    const SHEET_ID = '1jMprhV4a_-mc_p-0PRo3akIT_mJfWW7ATnxSQdwz2xM';
    const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    let globalChart, riskLineChart;
    const formatBRL = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0 });

    function init() {
        globalChart = new Chart(document.getElementById('globalDoughnutChart'), {
            type: 'doughnut',
            data: { datasets: [{ data: [0, 100], backgroundColor: ['#243776', '#141629'], borderWidth: 0 }] },
            options: { cutout: '88%', plugins: { tooltip: { enabled: false } } }
        });

        riskLineChart = new Chart(document.getElementById('riskLineChart'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#f26122', tension: 0.4, fill: true, backgroundColor: 'rgba(242, 97, 34, 0.1)', borderWidth: 4, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { ticks: { color: '#8b9bb4' }, grid: { display: false } } }, plugins: { legend: { enabled: false } } }
        });
        updateData();
        setInterval(updateData, 30000); 
    }

    async function updateData() {
        try {
            const res = await fetch(GVIZ_URL);
            const text = await res.text();
            // Limpeza do JSON que o Google retorna (removendo prefixo/sufixo da API)
            const json = JSON.parse(text.substring(47, text.length - 2));
            const rows = json.table.rows;

            let totalVendido = 0, totalMeta = 0;
            let labels = [], valores = [];

            rows.forEach(row => {
                const venda = row.c[1] ? (row.c[1].v || 0) : 0;
                const meta = row.c[2] ? (row.c[2].v || 0) : 0;
                totalVendido += venda;
                totalMeta += meta;
                labels.push(row.c[0] ? row.c[0].f || row.c[0].v : ''); 
                valores.push(venda);
            });

            const lastRow = rows[rows.length - 1];
            const vendaHoje = lastRow.c[1] ? lastRow.c[1].v : 0;
            const metaDia = lastRow.c[2] ? lastRow.c[2].v : 0;
            
            const percDia = (vendaHoje / (metaDia || 1)) * 100;
            const percGlobal = (totalVendido / (totalMeta || 1)) * 100;

            // Update UI
            document.getElementById('metaGlobalValue').innerText = formatBRL(totalMeta);
            document.getElementById('globalVendido').innerText = formatBRL(totalVendido);
            document.getElementById('globalRestante').innerText = formatBRL(Math.max(0, totalMeta - totalVendido));
            document.getElementById('globalPercentageText').innerText = `${percGlobal.toFixed(0)}%`;
            document.getElementById('metaDiaValue').innerText = formatBRL(metaDia);
            document.getElementById('vendidoHojeValue').innerText = formatBRL(vendaHoje);

            // Charts
            globalChart.data.datasets[0].data = [percGlobal, 100 - percGlobal];
            globalChart.update();

            riskLineChart.data.labels = labels.slice(-10);
            riskLineChart.data.datasets[0].data = valores.slice(-10);
            riskLineChart.update();

            // Alerta
            const beacon = document.getElementById('alertBeacon');
            if(percDia < 50) { beacon.style.background = '#ff0055'; beacon.innerText = "🚨 RISCO ALTO"; }
            else if(percDia < 100) { beacon.style.background = '#fe0'; beacon.style.color = '#000'; beacon.innerText = "⚠️ ACELERAR"; }
            else { beacon.style.background = '#0f9'; beacon.style.color = '#000'; beacon.innerText = "🏆 META BATIDA"; }

        } catch (err) { console.error("Erro ao carregar dados", err); }
    }

    window.onload = init;
</script>
</body>
</html>
