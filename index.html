<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NATURAL IMPORTS | TV DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #f26122; --blue: #243776; --green: #00ff88; --bg: #020205; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            height: 100vh; overflow: hidden; padding: 15px;
            background-image: radial-gradient(circle at 50% 50%, #0a0e1f 0%, #020205 100%);
        }
        .container { display: flex; flex-direction: column; height: 100%; gap: 15px; }
        
        /* Card Global */
        .global-box { 
            background: rgba(36, 55, 118, 0.15); border: 2px solid var(--blue); border-radius: 20px;
            padding: 30px; height: 38%; display: flex; align-items: center; justify-content: space-between;
        }
        .big-val { font-family: 'Orbitron'; font-size: 8vh; color: var(--orange); line-height: 1; }
        .label { font-family: 'Orbitron'; font-size: 1.2vh; color: var(--blue); letter-spacing: 3px; }

        /* Grid Central */
        .mid-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 20%; }
        .card { 
            background: rgba(255,255,255,0.03); border-radius: 15px; padding: 20px;
            border-left: 6px solid var(--blue); display: flex; flex-direction: column; justify-content: center;
        }
        .val-mid { font-family: 'Orbitron'; font-size: 5vh; font-weight: 900; }
        
        /* Cores de Sucesso */
        .meta-batida { border-left-color: var(--green) !important; background: rgba(0, 255, 136, 0.05) !important; }
        .text-green { color: var(--green) !important; }

        /* Gráfico de Risco */
        .risk-box { 
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(36, 55, 118, 0.3);
            border-radius: 20px; padding: 15px; position: relative;
        }
        #status-pill { position: absolute; top: 15px; right: 15px; padding: 5px 20px; border-radius: 20px; font-family: 'Orbitron'; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="global-box">
        <div>
            <p class="label">META GLOBAL MÊS</p>
            <div id="g-meta" class="big-val">R$ 0</div>
            <div style="display:flex; gap:30px; margin-top:15px; font-family:'Orbitron';">
                <p>ACUMULADO: <span id="g-real" style="color:#fff">R$ 0</span></p>
                <p>FALTA: <span id="g-falta" style="color:var(--orange)">R$ 0</span></p>
            </div>
        </div>
        <div style="width: 25vh; height: 25vh; position: relative;">
            <canvas id="chartG"></canvas>
            <div id="percG" style="position: absolute; top:35%; left:25%; font-family:'Orbitron'; font-size:4vh; color:var(--orange)">0%</div>
        </div>
    </div>

    <div class="mid-grid">
        <div class="card" id="card-meta">
            <p class="label">META NECESSÁRIA HOJE</p>
            <div id="d-meta" class="val-mid">R$ 0</div>
            <p style="font-size: 14px; margin-top:5px; opacity:0.7">RESTANTE: <span id="d-falta">R$ 0</span></p>
        </div>
        <div class="card" id="card-venda">
            <p class="label">VENDIDO AGORA</p>
            <div id="d-venda" class="val-mid" style="color:var(--orange)">R$ 0</div>
            <p style="font-size: 14px; margin-top:5px; opacity:0.7">ATINGIDO: <span id="d-perc" style="color:var(--orange)">0%</span></p>
        </div>
    </div>

    <div class="risk-box">
        <p class="label" style="opacity:0.5">RITMO DE VENDAS DIÁRIO</p>
        <div id="status-pill" style="background: var(--blue)">ATUALIZANDO...</div>
        <div style="height: 90%; width: 100%;">
            <canvas id="chartR"></canvas>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '1jMprhV4a_-mc_p-0PRo3akIT_mJfWW7ATnxSQdwz2xM';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    let cg, cr;

    function format(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0 }); }

    function getDays() {
        const d = new Date();
        const last = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
        let c = 0;
        for (let i = d.getDate(); i <= last; i++) {
            const day = new Date(d.getFullYear(), d.getMonth(), i).getDay();
            if (day !== 0 && day !== 6) c++;
        }
        return c || 1;
    }

    async function update() {
        try {
            const res = await fetch(URL);
            const text = await res.text();
            const json = JSON.parse(text.substring(47, text.length - 2));
            const row = json.table.rows[json.table.rows.length - 1].c;

            // Mapeamento Colunas: B=1, C=2, E=4
            const vHoje = row[1]?.v || 0;
            const mGlobal = row[2]?.v || 0;
            const vMesBase = row[4]?.v || 0;

            const vTotalMes = vMesBase + vHoje;
            const faltaGeral = Math.max(0, mGlobal - vTotalMes);
            const dias = getDays();
            
            // Meta do dia: o que falta no geral dividido pelos dias restantes
            const metaDia = (mGlobal - vMesBase) / dias;
            const faltaHoje = metaDia - vHoje;
            const percDia = (vHoje / metaDia) * 100;
            const percGlobal = (vTotalMes / mGlobal) * 100;

            // Inserir Dados
            document.getElementById('g-meta').innerText = format(mGlobal);
            document.getElementById('g-real').innerText = format(vTotalMes);
            document.getElementById('g-falta').innerText = format(faltaGeral);
            document.getElementById('d-meta').innerText = format(metaDia);
            document.getElementById('d-venda').innerText = format(vHoje);
            document.getElementById('d-perc').innerText = Math.floor(percDia) + '%';
            document.getElementById('percG').innerText = Math.floor(percGlobal) + '%';

            // Lógica de Cores (VERDE)
            const cardVenda = document.getElementById('card-venda');
            const dVenda = document.getElementById('d-venda');
            const dFalta = document.getElementById('d-falta');
            const pill = document.getElementById('status-pill');

            if (vHoje >= metaDia) {
                cardVenda.classList.add('meta-batida');
                dVenda.classList.add('text-green');
                dFalta.innerText = "META BATIDA!";
                dFalta.classList.add('text-green');
                pill.style.background = "#00ff88";
                pill.style.color = "#000";
                pill.innerText = "EXCELENTE DESEMPENHO";
            } else {
                cardVenda.classList.remove('meta-batida');
                dVenda.classList.remove('text-green');
                dFalta.innerText = format(Math.max(0, faltaHoje));
                dFalta.classList.remove('text-green');
                pill.style.background = "#f26122";
                pill.innerText = "EM PROGRESSO";
            }

            // Atualizar Gráficos
            cg.data.datasets[0].data = [percGlobal, 100 - percGlobal];
            cg.update();

            cr.data.datasets[0].data = [0, vHoje * 0.3, vHoje * 0.6, vHoje * 0.9, vHoje];
            cr.options.scales.y.max = Math.max(metaDia, vHoje) * 1.2;
            cr.data.datasets[0].borderColor = (vHoje >= metaDia) ? '#00ff88' : '#f26122';
            cr.update();

        } catch (e) { console.error("Erro dados:", e); }
    }

    // Inicialização
    window.onload = () => {
        const ctxG = document.getElementById('chartG').getContext('2d');
        cg = new Chart(ctxG, {
            type: 'doughnut',
            data: { datasets: [{ data: [0, 100], backgroundColor: ['#f26122', '#1a1a1a'], borderWidth: 0 }] },
            options: { cutout: '80%', plugins: { tooltip: false } }
        });

        const ctxR = document.getElementById('chartR').getContext('2d');
        cr = new Chart(ctxR, {
            type: 'line',
            data: { 
                labels: ['08h', '11h', '13h', '16h', '18h18'],
                datasets: [{ 
                    data: [0,0,0,0,0], borderColor: '#f26122', borderWidth: 10, 
                    fill: true, backgroundColor: 'rgba(242, 97, 34, 0.1)', tension: 0.4, pointRadius: 0 
                }]
            },
            options: { 
                maintainAspectRatio: false, 
                scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#243776' } } },
                plugins: { legend: false }
            }
        });

        update();
        setInterval(update, 30000);
    };
</script>
</body>
</html>
