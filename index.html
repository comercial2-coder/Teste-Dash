<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DASHBOARD NATURAL IMPORTS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --orange: #f26122; --blue: #243776; --green: #00ff88; --bg: #020205; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; 
            height: 100vh; overflow: hidden; padding: 20px;
        }
        .container { display: flex; flex-direction: column; height: 100%; gap: 20px; }
        
        /* Seção Meta Global */
        .global-card { 
            background: rgba(36, 55, 118, 0.2); border: 2px solid var(--blue); border-radius: 25px;
            padding: 40px; height: 40%; display: flex; align-items: center; justify-content: space-between;
        }
        .big-money { font-size: 10vh; color: var(--orange); font-weight: bold; }
        .label-top { font-size: 2vh; color: var(--blue); letter-spacing: 5px; font-weight: bold; margin-bottom: 10px; }

        /* Grid Central */
        .mid-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 25%; }
        .card { 
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 30px;
            border-left: 10px solid var(--blue); display: flex; flex-direction: column; justify-content: center;
        }
        .val-mid { font-size: 7vh; font-weight: bold; }
        
        /* Estilos de Sucesso (VERDE) */
        .bg-success { background: rgba(0, 255, 136, 0.2) !important; border-left-color: var(--green) !important; }
        .text-green { color: var(--green) !important; }

        /* Rodapé / Risco */
        .risk-area { 
            flex: 1; background: #000; border-radius: 25px; padding: 20px; 
            position: relative; border: 1px solid #243776;
        }
        #status-tag { position: absolute; top: 20px; right: 20px; padding: 10px 30px; border-radius: 30px; font-weight: bold; font-size: 1.5vh; }
    </style>
</head>
<body>

<div class="container">
    <div class="global-card">
        <div>
            <p class="label-top">META GLOBAL DO MÊS</p>
            <div id="txt-meta-global" class="big-money">R$ 0</div>
            <div style="display:flex; gap:40px; margin-top:20px; font-size: 2.5vh; font-weight: bold;">
                <p style="color:#aaa">ACUMULADO: <span id="txt-acumulado" style="color:#fff">R$ 0</span></p>
                <p style="color:#aaa">FALTA: <span id="txt-falta-global" style="color:var(--orange)">R$ 0</span></p>
            </div>
        </div>
        <div style="width: 30vh; height: 30vh;">
            <canvas id="chartGlobal"></canvas>
        </div>
    </div>

    <div class="mid-grid">
        <div class="card">
            <p class="label-top">META DO DIA (ALVO FIXO)</p>
            <div id="txt-meta-dia" class="val-mid">R$ 0</div>
            <p id="txt-falta-dia-label" style="font-size: 2vh; margin-top:10px;">FALTA: <span id="txt-falta-dia">R$ 0</span></p>
        </div>
        <div class="card" id="card-venda-dia">
            <p class="label-top">VENDIDO HOJE</p>
            <div id="txt-vendido-dia" class="val-mid" style="color:var(--orange)">R$ 0</div>
            <p style="font-size: 2vh; margin-top:10px;">ATINGIDO: <span id="txt-perc-dia">0%</span></p>
        </div>
    </div>

    <div class="risk-area">
        <div id="status-tag" style="background: var(--blue)">CONECTANDO...</div>
        <canvas id="chartRisco"></canvas>
    </div>
</div>

<script>
    // Configurações
    var SHEET_ID = '1jMprhV4a_-mc_p-0PRo3akIT_mJfWW7ATnxSQdwz2xM';
    var URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json';

    var chartG, chartR;

    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0 });
    }

    function calcularDiasUteis() {
        var d = new Date();
        var ultimoDia = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
        var cont = 0;
        for (var i = d.getDate(); i <= ultimoDia; i++) {
            var semana = new Date(d.getFullYear(), d.getMonth(), i).getDay();
            if (semana != 0 && semana != 6) cont++;
        }
        return cont || 1;
    }

    async function atualizarDados() {
        try {
            var resposta = await fetch(URL);
            var texto = await resposta.text();
            // Limpa o lixo que o Google manda antes do JSON
            var jsonLimpo = JSON.parse(texto.substring(47, texto.length - 2));
            var dados = jsonLimpo.table.rows;
            var ultimaLinha = dados[dados.length - 1].c;

            // Extração (B=1, C=2, E=4)
            var vendidoHoje = ultimaLinha[1] ? ultimaLinha[1].v : 0;
            var metaGlobal = ultimaLinha[2] ? ultimaLinha[2].v : 0;
            var acumuladoMesPlanilha = ultimaLinha[4] ? ultimaLinha[4].v : 0;

            // Lógica Pedida
            var acumuladoTotal = acumuladoMesPlanilha + vendidoHoje;
            var faltaGeral = metaGlobal - acumuladoTotal;
            if(faltaGeral < 0) faltaGeral = 0;

            var dias = calcularDiasUteis();
            // Meta do dia baseada no que falta dividido pelos dias que restam
            var metaDoDia = (metaGlobal - acumuladoMesPlanilha) / dias;
            var faltaNoDia = metaDoDia - vendidoHoje;
            var percDia = (vendidoHoje / metaDoDia) * 100;
            var percGlobal = (acumuladoTotal / metaGlobal) * 100;

            // Atualiza Textos na Tela
            document.getElementById('txt-meta-global').innerHTML = formatarMoeda(metaGlobal);
            document.getElementById('txt-acumulado').innerHTML = formatarMoeda(acumuladoTotal);
            document.getElementById('txt-falta-global').innerHTML = formatarMoeda(faltaGeral);
            document.getElementById('txt-meta-dia').innerHTML = formatarMoeda(metaDoDia);
            document.getElementById('txt-vendido-dia').innerHTML = formatarMoeda(vendidoHoje);
            document.getElementById('txt-perc-dia').innerHTML = Math.floor(percDia) + '%';

            // Lógica de Cores e Excedente
            var card = document.getElementById('card-venda-dia');
            var valVenda = document.getElementById('txt-vendido-dia');
            var labelFalta = document.getElementById('txt-falta-dia-label');
            var tag = document.getElementById('status-tag');

            if (vendidoHoje >= metaDoDia) {
                card.className = "card bg-success";
                valVenda.className = "val-mid text-green";
                labelFalta.innerHTML = "EXCEDENTE: <span class='text-green'>" + formatarMoeda(Math.abs(faltaNoDia)) + "</span>";
                tag.style.background = "#00ff88";
                tag.style.color = "#000";
                tag.innerHTML = "META BATIDA";
            } else {
                card.className = "card";
                valVenda.className = "val-mid";
                labelFalta.innerHTML = "FALTA: <span>" + formatarMoeda(faltaNoDia) + "</span>";
                tag.style.background = "#243776";
                tag.style.color = "#fff";
                tag.innerHTML = "EM OPERAÇÃO";
            }

            // Atualiza Gráficos
            chartG.data.datasets[0].data = [percGlobal, 100 - percGlobal];
            chartG.update();

            chartR.data.datasets[0].data = [0, vendidoHoje * 0.4, vendidoHoje * 0.8, vendidoHoje];
            chartR.options.scales.y.max = Math.max(metaDoDia, vendidoHoje) * 1.1;
            chartR.data.datasets[0].borderColor = (vendidoHoje >= metaDoDia) ? "#00ff88" : "#f26122";
            chartR.update();

        } catch (erro) {
            console.log("Erro ao buscar dados:", erro);
        }
    }

    // Inicialização
    window.onload = function() {
        // Grafico de Rosca
        chartG = new Chart(document.getElementById('chartGlobal'), {
            type: 'doughnut',
            data: { datasets: [{ data: [0, 100], backgroundColor: ['#f26122', '#1a1a1a'], borderWidth: 0 }] },
            options: { cutout: '80%', plugins: { legend: false } }
        });

        // Grafico de Linha
        chartR = new Chart(document.getElementById('chartRisco'), {
            type: 'line',
            data: { 
                labels: ['Início', 'Meio', 'Agora'],
                datasets: [{ 
                    data: [0,0,0], borderColor: '#f26122', borderWidth: 12, 
                    fill: false, tension: 0.4, pointRadius: 0 
                }]
            },
            options: { 
                maintainAspectRatio: false, 
                scales: { y: { display: false }, x: { ticks: { color: '#243776', font: { weight: 'bold' } } } },
                plugins: { legend: false }
            }
        });

        atualizarDados();
        setInterval(atualizarDados, 30000); // 30 segundos
    };
</script>
</body>
</html>
