<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATURAL IMPORTS | COMMAND CENTER</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #f26122; --brand-orange-glow: rgba(242, 97, 34, 0.4);
            --brand-blue: #243776; --brand-blue-glow: rgba(36, 55, 118, 0.6);
            --bg-disk: #030306; --text-primary: #fff; --text-secondary: #8b9bb4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* FUNDO COM VIBRAÇÃO E GRADIENTE AZUL */
        body { 
            background-color: var(--bg-disk);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(36, 55, 118, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(36, 55, 118, 0.2) 0%, transparent 40%);
            color: var(--text-primary); 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 1.5vh; 
            position: relative;
        }

        /* Animação de Vibração Suave no Fundo */
        body::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3%3Ffilter id="n"%3%3FfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3%3F/filter%3%3Frect width="100%" height="100%" filter="url(%23n)"/%3%3F/svg%3%3F');
            opacity: 0.015; /* Vibração quase imperceptível */
            pointer-events: none;
            animation: vibrateBg 10s infinite linear;
        }
        @keyframes vibrateBg { from { transform: translate(0,0); } to { transform: translate(1%,1%); } }

        .main-container { width: 100%; height: 100%; display: flex; flex-direction: column; gap: 1.5vh; z-index: 10; }

        /* Meta Global - FOCO AZUL */
        .global-section { 
            background: rgba(10, 11, 20, 0.6); /* Semi-Transparente */
            border: 2px solid var(--brand-blue); /* Borda Azul Sutil */
            border-radius: 20px; 
            padding: 4vh; 
            height: 40vh; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: relative; 
            box-shadow: 0 0 20px var(--brand-blue-glow); /* Glow Azul */
            backdrop-filter: blur(10px);
        }
        .global-value { font-family: 'Orbitron'; font-size: 8.5vh; color: var(--brand-orange); text-shadow: 0 0 15px var(--brand-orange-glow); }
        .global-chart-container { width: 30vh; height: 30vh; position: relative; display: flex; align-items: center; justify-content: center; }
        #percCenter { position: absolute; font-family: 'Orbitron'; font-size: 5.5vh; color: var(--brand-orange); }

        /* Grid Central - FOCO LARANJA */
        .daily-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2vh; height: 18vh; }
        .card { 
            background: rgba(36, 55, 118, 0.1); /* Fundo Azul Transparente */
            border-radius: 15px; 
            padding: 2.5vh; 
            border: 1px solid rgba(255,255,255,0.03); 
            backdrop-filter: blur(5px);
        }
        .card-value { font-family: 'Orbitron'; font-size: 5vh; font-weight: 900; }

        /* Gráfico de Risco Inferior */
        .risk-section { 
            background: rgba(10, 11, 20, 0.7); 
            flex: 1; 
            border-radius: 20px; 
            padding: 2vh; 
            border: 1px solid var(--brand-blue); /* Borda Azul */
            box-shadow: 0 0 10px var(--brand-blue-glow);
            display: flex; 
            flex-direction: column; 
            backdrop-filter: blur(8px);
        }
        .risk-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1vh; }
        #statusLabel { padding: 0.5vh 2vh; border-radius: 4px; font-family: 'Orbitron'; font-size: 1.4vh; font-weight: bold; }
        
        .chart-container { flex: 1; position: relative; }
    </style>
</head>
<body>

<div class="main-container">
    <header style="text-align:center; height: 2vh; font-family:'Orbitron'; font-size:1.1vh; color:var(--brand-blue); letter-spacing:4px;">NATURAL IMPORTS | GLOBAL OPERATIONS COMMAND CENTER</header>

    <section class="global-section">
        <div>
            <p style="color:var(--text-secondary); font-family:'Orbitron'; font-size:1.4vh;">META GLOBAL ACUMULADA</p>
            <div id="val-global-meta" class="global-value">R$ 0</div>
            <div style="display:flex; gap:4vh; font-size:2vh; margin-top:1vh;">
                <p style="color:var(--text-secondary)">Realizado: <span id="val-global-vendido" style="color:#fff">R$ 0</span></p>
                <p style="color:var(--text-secondary)">Gap: <span id="val-global-falta" style="color:var(--brand-orange)">R$ 0</span></p>
            </div>
        </div>
        <div class="global-chart-container">
            <canvas id="chartGlobal"></canvas>
            <div id="percCenter">0%</div>
        </div>
    </section>

    <section class="daily-grid">
        <div class="card" style="border-left: 3px solid var(--brand-blue);"><p style="color:var(--text-secondary); font-size:1.3vh; font-family:'Orbitron'">OBJETIVO DO DIA</p><div id="val-dia-meta" class="card-value">R$ 0</div></div>
        <div class="card" style="border-left: 3px solid var(--brand-orange);"><p style="color:var(--text-secondary); font-size:1.3vh; font-family:'Orbitron'">REALIZADO HOJE</p><div id="val-dia-vendido" class="card-value" style="color:var(--brand-orange); text-shadow:0 0 10px var(--brand-orange-glow)">R$ 0</div></div>
    </section>

    <section class="risk-section">
        <div class="risk-header">
            <p style="font-family:'Orbitron'; font-size:1.2vh; color:var(--text-secondary);">PROJEÇÃO DE ATINGIMENTO (REAL VS META)</p>
            <div id="statusLabel">CALCULANDO RISCO...</div>
        </div>
        <div class="chart-container">
            <canvas id="chartRisk"></canvas>
        </div>
    </section>
</div>

<script>
    const SHEET_ID = '1jMprhV4a_-mc_p-0PRo3akIT_mJfWW7ATnxSQdwz2xM';
    const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    let chartG, chartR;
    let lastValues = {}; 

    const formatBRL = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0 });

    function animateValue(id, target) {
        const el = document.getElementById(id);
        const start = lastValues[id] || 0;
        if (start === target) return;

        let startTime = null;
        const duration = 1500; 

        function step(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = Math.min((timestamp - startTime) / duration, 1);
            const current = Math.floor(progress * (target - start) + start);
            el.innerText = formatBRL(current);
            if (progress < 1) requestAnimationFrame(step);
        }
        lastValues[id] = target;
        requestAnimationFrame(step);
    }

    function init() {
        chartG = new Chart(document.getElementById('chartGlobal'), {
            type: 'doughnut',
            data: { datasets: [{ data: [0, 100], backgroundColor: ['#f26122', 'rgba(36, 55, 118, 0.1)'], borderWidth: 0 }] }, // Laranja ID vs Fundo Transparente
            options: { cutout: '85%', plugins: { tooltip: { enabled: false } }, animation: { duration: 2000, easing: 'easeOutQuart' } }
        });

        chartR = new Chart(document.getElementById('chartRisk'), {
            type: 'line',
            data: { 
                labels: ['0%','25%','50%','75%','100%'], 
                datasets: [
                    { label: 'Realizado', data: [0, 0], borderColor: '#f26122', borderWidth: 5, fill: true, backgroundColor: 'rgba(242, 97, 34, 0.1)', tension: 0.1 },
                    { label: 'Caminho Meta', data: [0, 100], borderColor: 'rgba(255,255,255,0.05)', borderDash: [5,5], borderWidth: 1, fill: false }
                ]
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { y: { display: false, min: 0 }, x: { ticks: { color: '#444' }, grid: { display: false } } },
                plugins: { legend: { enabled: false } },
                animation: { duration: 1500, easing: 'easeOutCubic' }
            }
        });
        update();
        setInterval(update, 30000);
    }

    async function update() {
        try {
            const res = await fetch(GVIZ_URL);
            const text = await res.text();
            const json = JSON.parse(text.substring(47, text.length - 2));
            const rows = json.table.rows;

            let tV = 0, tM = 0;
            rows.forEach(r => {
                tV += r.c[1] ? r.c[1].v : 0;
                tM += r.c[2] ? r.c[2].v : 0;
            });

            const lastRow = rows[rows.length - 1];
            const vH = lastRow.c[1].v;
            const mH = lastRow.c[2].v;
            const pG = (tV / tM) * 100;
            const pD = (vH / mH) * 100;

            animateValue('val-global-meta', tM);
            animateValue('val-global-vendido', tV);
            animateValue('val-global-falta', Math.max(0, tM - tV));
            animateValue('val-dia-meta', mH);
            animateValue('val-dia-vendido', vH);
            document.getElementById('percCenter').innerText = pG.toFixed(0) + '%';

            chartG.data.datasets[0].data = [pG, 100 - pG];
            chartG.update();

            chartR.data.datasets[0].data = [0, vH]; 
            chartR.options.scales.y.max = mH; 
            chartR.update();

            const lb = document.getElementById('statusLabel');
            if(pD < 50) { lb.style.background = '#ff0044'; lb.innerText = 'RISCO CRÍTICO'; }
            else if(pD < 90) { lb.style.background = '#f26122'; lb.innerText = 'RITMO EM ATENÇÃO'; }
            else { lb.style.background = '#00ff88'; lb.style.color = '#000'; lb.innerText = 'META ATINGIDA'; }

        } catch (e) { console.error(e); }
    }
    window.onload = init;
</script>
</body>
</html>
