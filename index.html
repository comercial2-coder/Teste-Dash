<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMAND CENTER | NATURAL IMPORTS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #f26122; --brand-blue: #243776;
            --bg-disk: #020205; --text-primary: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: var(--bg-disk);
            color: var(--text-primary); 
            font-family: 'Rajdhani', sans-serif; 
            height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center; padding: 1.5vh;
            /* Vibração de fundo sutil */
            background-image: radial-gradient(circle at 50% 50%, #0a0e1f 0%, #020205 100%);
            animation: pulseBg 10s infinite alternate;
        }
        @keyframes pulseBg { from { opacity: 0.8; } to { opacity: 1; } }

        .main-container { width: 100%; height: 100%; display: flex; flex-direction: column; gap: 1.5vh; }

        /* Meta Global - Estilo Glass */
        .section-global { 
            background: rgba(36, 55, 118, 0.1);
            border: 1px solid var(--brand-blue);
            border-radius: 20px; padding: 4vh; height: 38vh;
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(36, 55, 118, 0.2);
        }
        .label-tech { font-family: 'Orbitron'; font-size: 1.3vh; color: var(--brand-blue); letter-spacing: 3px; margin-bottom: 1vh; }
        .val-main { font-family: 'Orbitron'; font-size: 9vh; color: var(--brand-orange); text-shadow: 0 0 25px rgba(242, 97, 34, 0.6); line-height: 1; }

        /* Grid Central */
        .grid-mid { display: grid; grid-template-columns: 1fr 1fr; gap: 2vh; height: 18vh; }
        .card-mid { 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 15px; padding: 2vh; 
            border-left: 4px solid var(--brand-blue);
            display: flex; flex-direction: column; justify-content: center;
        }
        .val-mid { font-family: 'Orbitron'; font-size: 5.5vh; font-weight: 900; }

        /* Seção de Risco - ALTO IMPACTO */
        .section-risk { 
            background: rgba(5, 7, 15, 0.8);
            flex: 1; border-radius: 20px; padding: 2vh;
            border: 1px solid rgba(36, 55, 118, 0.4);
            display: flex; flex-direction: column; position: relative;
            overflow: hidden;
        }
        #riskStatus { position: absolute; top: 2vh; right: 2vh; padding: 0.8vh 3vh; border-radius: 50px; font-family: 'Orbitron'; font-size: 1.2vh; z-index: 10; font-weight: 900; }
        
        .chart-box { flex: 1; width: 102%; margin-left: -1%; margin-bottom: -1vh; }
    </style>
</head>
<body>

<div class="main-container">
    <header style="text-align:center; font-family:'Orbitron'; font-size:1vh; color:var(--brand-blue); letter-spacing:8px; margin-bottom: -1vh;">STRATEGIC COMMAND CENTER</header>

    <section class="section-global">
        <div>
            <p class="label-tech">OBJETIVO GLOBAL DO MÊS</p>
            <div id="disp-meta-global" class="val-main">R$ 0</div>
            <div style="display:flex; gap:5vh; margin-top:2vh; font-family:'Orbitron'; font-size:1.8vh;">
                <p style="color:var(--brand-blue)">PROCESSO <span id="disp-vendido-mes" style="color:#fff">R$ 0</span></p>
                <p style="color:var(--brand-blue)">RESTANTE <span id="disp-gap-global" style="color:var(--brand-orange)">R$ 0</span></p>
            </div>
        </div>
        <div style="width: 30vh; height: 30vh; position: relative; display: flex; align-items: center; justify-content: center;">
            <canvas id="chartG"></canvas>
            <div id="percG" style="position: absolute; font-family: 'Orbitron'; font-size: 6vh; color: var(--brand-orange);">0%</div>
        </div>
    </section>

    <section class="grid-mid">
        <div class="card-mid">
            <p class="label-tech" style="color:#8b9bb4">META DIÁRIA NECESSÁRIA</p>
            <div id="disp-meta-dia" class="val-mid">R$ 0</div>
        </div>
        <div class="card-mid" style="border-left-color: var(--brand-orange);">
            <p class="label-tech" style="color:#8b9bb4">VENDIDO HOJE</p>
            <div id="disp-vendido-dia" class="val-mid" style="color:var(--brand-orange); text-shadow: 0 0 15px rgba(242, 97, 34, 0.4);">R$ 0</div>
        </div>
    </section>

    <section class="section-risk">
        <p class="label-tech" style="margin-left: 1vh;">RISCO DE ATINGIMENTO DA META DIÁRIA</p>
        <div id="riskStatus">CALCULANDO...</div>
        <div class="chart-box">
            <canvas id="chartR"></canvas>
        </div>
    </section>
</div>

<script>
    const SHEET_ID = '1jMprhV4a_-mc_p-0PRo3akIT_mJfWW7ATnxSQdwz2xM';
    const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    let cg, cr;
    let lastV = {};

    const format = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0 });

    function getBusinessDaysRemaining() {
        const today = new Date();
        const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
        let count = 0;
        for (let d = new Date(today); d <= lastDay; d.setDate(d.getDate() + 1)) {
            const day = d.getDay();
            if (day !== 0 && day !== 6) count++; // Ignora Sáb/Dom
        }
        return count || 1;
    }

    function animate(id, target) {
        const start = lastV[id] || 0;
        if (start === target) return;
        const el = document.getElementById(id);
        let startT = null;
        const dur = 1500;
        function step(t) {
            if (!startT) startT = t;
            const progress = Math.min((t - startT) / dur, 1);
            const curr = Math.floor(progress * (target - start) + start);
            el.innerText = format(curr);
            if (progress < 1) requestAnimationFrame(step);
        }
        lastV[id] = target;
        requestAnimationFrame(step);
    }

    function init() {
        cg = new Chart(document.getElementById('chartG'), {
            type: 'doughnut',
            data: { datasets: [{ data: [0, 100], backgroundColor: ['#f26122', '#121626'], borderWidth: 0 }] },
            options: { cutout: '85%', plugins: { tooltip: false } }
        });

        cr = new Chart(document.getElementById('chartR'), {
            type: 'line',
            data: { 
                labels: ['0%','','','','100%'], 
                datasets: [{ 
                    data: [0, 0, 0, 0, 0], 
                    borderColor: '#f26122', borderWidth: 8, fill: true,
                    backgroundColor: (ctx) => {
                        const c = ctx.chart.ctx;
                        const g = c.createLinearGradient(0, 0, 0, 400);
                        g.addColorStop(0, 'rgba(242, 97, 34, 0.4)');
                        g.addColorStop(1, 'rgba(36, 55, 118, 0)');
                        return g;
                    },
                    tension: 0.4, pointRadius: 0
                }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { y: { display: false, min: 0 }, x: { grid: false, ticks: { color: '#243776', font: { family: 'Orbitron' } } } },
                plugins: { legend: false }
            }
        });
        update();
        setInterval(update, 30000);
    }

    async function update() {
        try {
            const res = await fetch(GVIZ_URL);
            const text = await res.text();
            const json = JSON.parse(text.substring(47, text.length - 2));
            const lastRow = json.table.rows[json.table.rows.length - 1].c;

            const vDia = lastRow[1].v; // Col B
            const metaGlobal = lastRow[2].v; // Col C
            const vTotalMes = lastRow[4].v; // Col E

            const gapGlobal = Math.max(0, metaGlobal - vTotalMes);
            const diasRestantes = getBusinessDaysRemaining();
            const metaDiaNec = gapGlobal / diasRestantes;
            
            const percGlobal = (vTotalMes / metaGlobal) * 100;
            const percDia = (vDia / metaDiaNec) * 100;

            // UI
            animate('disp-meta-global', metaGlobal);
            animate('disp-vendido-mes', vTotalMes);
            animate('disp-gap-global', gapGlobal);
            animate('disp-meta-dia', metaDiaNec);
            animate('disp-vendido-dia', vDia);
            document.getElementById('percG').innerText = Math.floor(percGlobal) + '%';

            // Charts
            cg.data.datasets[0].data = [percGlobal, 100 - percGlobal];
            cg.update();

            // Gráfico de Risco: Simula o caminho até a meta necessária
            cr.data.datasets[0].data = [0, vDia/4, vDia/2, vDia/1.5, vDia];
            cr.options.scales.y.max = Math.max(metaDiaNec, vDia);
            cr.update();

            const st = document.getElementById('riskStatus');
            if(percDia < 40) { st.style.background = '#ff0044'; st.innerText = 'RISCO: CRÍTICO'; }
            else if(percDia < 100) { st.style.background = '#f26122'; st.innerText = 'RISCO: MÉDIO'; }
            else { st.style.background = '#00ff88'; st.style.color='#000'; st.innerText = 'META BATIDA'; }

        } catch (e) { console.error(e); }
    }
    window.onload = init;
</script>
</body>
</html>
