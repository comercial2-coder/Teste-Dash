
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.dash-wrap{position:relative}
.dash{background:#0c1f3f;border-radius:16px;padding:24px}
.dash.fullscreen{position:fixed;top:0;left:0;width:100vw;height:100vh;border-radius:0;z-index:9999;display:flex;flex-direction:column;justify-content:center;padding:48px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.header-left h2{font-size:13px;font-weight:500;color:#b5d4f4;letter-spacing:.06em;text-transform:uppercase}
.header-left p{font-size:12px;color:#5a7fa8;margin-top:3px}
.header-right{display:flex;gap:8px;align-items:center}
.btn{background:#142d54;border:0.5px solid #1e3f70;color:#85b7eb;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:#1e3f70}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.dash.fullscreen .cards{gap:20px;margin-bottom:32px}
.card{background:#142d54;border:0.5px solid #1e3f70;border-radius:12px;padding:16px}
.dash.fullscreen .card{padding:24px;border-radius:16px}
.card-label{font-size:11px;color:#5a7fa8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.dash.fullscreen .card-label{font-size:13px;margin-bottom:12px}
.card-value{font-size:22px;font-weight:500;color:#e6f1fb;font-variant-numeric:tabular-nums}
.dash.fullscreen .card-value{font-size:36px}
.card-value.empty{color:#2a4a72}
.card-sub{font-size:11px;margin-top:5px}
.dash.fullscreen .card-sub{font-size:13px;margin-top:8px}
.card-sub.ok{color:#5dcaa5}
.card-sub.warn{color:#e76f51}
.card-sub.neutral{color:#5a7fa8}
.progress-wrap{background:#081629;border-radius:12px;padding:18px;border:0.5px solid #1e3f70}
.dash.fullscreen .progress-wrap{padding:28px;border-radius:16px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#5a7fa8;margin-bottom:10px}
.dash.fullscreen .progress-label{font-size:14px;margin-bottom:14px}
.progress-label span:last-child{color:#85b7eb;font-weight:500}
.progress-track{background:#1e3f70;border-radius:99px;height:10px;overflow:hidden}
.dash.fullscreen .progress-track{height:14px}
.progress-bar{height:100%;border-radius:99px;background:#378add;transition:width .8s ease}
.status-row{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:14px;border-top:0.5px solid #1e3f70}
.dot{width:8px;height:8px;border-radius:50%;background:#5dcaa5;flex-shrink:0}
.dot.err{background:#e76f51}
.dot.loading{background:#378add}
.status-msg{font-size:12px;color:#5a7fa8}
.dash.fullscreen .status-msg{font-size:13px}
.updated{font-size:11px;color:#2a4a72;margin-left:auto}
</style>

<div class="dash-wrap">
<div class="dash" id="dash">
  <div class="header">
    <div class="header-left">
      <h2>Painel de vendas</h2>
      <p id="data-range">Conectando à planilha...</p>
    </div>
    <div class="header-right">
      <button class="btn" onclick="loadData()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.1-3.45L10 6h5V1l-1.35 1.35z" fill="#85b7eb"/></svg>
        Atualizar
      </button>
      <button class="btn" id="fs-btn" onclick="toggleFS()">
        <svg id="fs-icon" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1 1h5v2H3v3H1V1zm9 0h5v5h-2V3h-3V1zM1 10h2v3h3v2H1v-5zm12 3h-3v2h5v-5h-2v3z" fill="#85b7eb"/></svg>
        Tela cheia
      </button>
    </div>
  </div>

  <div class="cards" id="cards">
    <div class="card">
      <div class="card-label">Meta geral</div>
      <div class="card-value empty" id="val-meta">—</div>
      <div class="card-sub neutral" id="sub-meta">preencha a planilha</div>
    </div>
    <div class="card">
      <div class="card-label">Vendido total</div>
      <div class="card-value empty" id="val-vendido">—</div>
      <div class="card-sub neutral" id="sub-vendido">acumulado do período</div>
    </div>
    <div class="card">
      <div class="card-label">% da meta</div>
      <div class="card-value empty" id="val-pct">—</div>
      <div class="card-sub neutral" id="sub-pct">progresso acumulado</div>
    </div>
    <div class="card" id="card-hoje">
      <div class="card-label">Vendido hoje</div>
      <div class="card-value empty" id="val-hoje">—</div>
      <div class="card-sub neutral" id="sub-hoje">data de hoje</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progresso da meta</span>
      <span id="pct-label">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="bar" style="width:0%"></div>
    </div>
    <div class="status-row">
      <div class="dot loading" id="dot"></div>
      <span class="status-msg" id="status-msg">Buscando dados...</span>
      <span class="updated" id="updated-at"></span>
    </div>
  </div>
</div>
</div>

<script>
const SHEET_ID='1jMprhV4a_-mc_p-0PRo3akIT_mJfWW7ATnxSQdwz2xM';
let isFS=false;

function toggleFS(){
  isFS=!isFS;
  const dash=document.getElementById('dash');
  const btn=document.getElementById('fs-btn');
  const cardHoje=document.getElementById('card-hoje');
  const subVend=document.getElementById('sub-vendido');
  if(isFS){
    dash.classList.add('fullscreen');
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M5 1H3v2H1v2h4V1zm6 0v4h4V3h-2V1h-2zM1 10v2h2v2h2v-4H1zm10 4h2v-2h2v-2h-4v4z" fill="#85b7eb"/></svg> Sair';
    cardHoje.style.display='none';
    subVend.textContent='total acumulado';
    document.body.style.overflow='hidden';
  } else {
    dash.classList.remove('fullscreen');
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1 1h5v2H3v3H1V1zm9 0h5v5h-2V3h-3V1zM1 10h2v3h3v2H1v-5zm12 3h-3v2h5v-5h-2v3z" fill="#85b7eb"/></svg> Tela cheia';
    cardHoje.style.display='block';
    document.body.style.overflow='';
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&isFS){isFS=true;toggleFS();}});

function fmt(n){
  if(n===null||isNaN(n))return'—';
  return'R$ '+Math.round(n).toLocaleString('pt-BR');
}
function parseNum(s){
  if(!s||s.trim()===''||s.trim()==='-')return null;
  return parseFloat(s.replace(/[^\d.,]/g,'').replace(',','.'));
}
function todayStr(){
  const d=new Date();
  return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function todayISO(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function loadData(){
  document.getElementById('dot').className='dot loading';
  document.getElementById('status-msg').textContent='Buscando dados...';
  try{
    const prompt=`Acesse via fetch o CSV público do Google Sheets com ID ${SHEET_ID} usando a URL: https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv
    
    Depois analise o CSV e retorne APENAS um JSON puro, sem markdown, sem explicação, no seguinte formato:
    {"meta": numero_ou_null, "totalVendido": numero, "vendidoHoje": numero_ou_null, "linhas": numero, "dataInicio": "string", "dataFim": "string", "erro": null}
    
    Regras: 
    - A primeira linha é cabeçalho com colunas: data, vendido, meta
    - Some todos os valores da coluna "vendido" para totalVendido
    - Pegue o valor da coluna "meta" (qualquer linha não nula)
    - Para vendidoHoje compare com a data de hoje: ${todayStr()} ou ${todayISO()}
    - Se não conseguir acessar, retorne: {"erro": "sem acesso"}
    - Retorne SOMENTE o JSON, nada mais`;

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:500,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    let jsonStr='';
    for(const block of data.content){
      if(block.type==='text'){jsonStr=block.text.trim();break;}
    }
    jsonStr=jsonStr.replace(/```json|```/g,'').trim();
    const d=JSON.parse(jsonStr);

    if(d.erro&&d.erro!==null){
      setEmpty('Planilha vazia ou sem dados ainda — preencha e atualize');
      return;
    }

    const meta=d.meta;
    const total=d.totalVendido||0;
    const hoje=d.vendidoHoje;
    const pct=meta?Math.min(Math.round((total/meta)*100),999):null;

    document.getElementById('val-meta').textContent=meta?fmt(meta):'Sem meta';
    document.getElementById('val-meta').className='card-value';
    document.getElementById('sub-meta').textContent='meta definida';

    document.getElementById('val-vendido').textContent=fmt(total);
    document.getElementById('val-vendido').className='card-value';
    document.getElementById('sub-vendido').textContent=`${d.linhas||0} dia(s) registrado(s)`;

    if(pct!==null){
      document.getElementById('val-pct').textContent=pct+'%';
      document.getElementById('val-pct').className='card-value';
      const el=document.getElementById('sub-pct');
      if(pct>=100){el.textContent='Meta atingida';el.className='card-sub ok';}
      else if(pct>=75){el.textContent='Quase lá';el.className='card-sub ok';}
      else if(pct>=40){el.textContent='Em andamento';el.className='card-sub neutral';}
      else{el.textContent='Abaixo da média';el.className='card-sub warn';}
    }

    document.getElementById('val-hoje').textContent=hoje?fmt(hoje):'—';
    document.getElementById('val-hoje').className='card-value';
    document.getElementById('sub-hoje').textContent=hoje?'registrado hoje':'sem venda hoje ainda';
    document.getElementById('sub-hoje').className=hoje?'card-sub ok':'card-sub neutral';

    document.getElementById('bar').style.width=(pct?Math.min(pct,100):0)+'%';
    document.getElementById('pct-label').textContent=pct!==null?pct+'%':'0%';

    if(d.dataInicio&&d.dataFim)
      document.getElementById('data-range').textContent=`${d.dataInicio} → ${d.dataFim}`;
    else
      document.getElementById('data-range').textContent='Dados carregados';

    document.getElementById('dot').className='dot';
    document.getElementById('status-msg').textContent='Dados carregados com sucesso';
    document.getElementById('updated-at').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  }catch(e){
    setEmpty('Planilha vazia ou sem dados — preencha e clique em Atualizar');
  }
}

function setEmpty(msg){
  document.getElementById('dot').className='dot err';
  document.getElementById('status-msg').textContent=msg;
  document.getElementById('data-range').textContent='Sem dados';
}

loadData();
</script>
